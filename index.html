<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="訓練">
<meta name="theme-color" content="#000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>訓練追蹤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--c1:rgba(255,255,255,.06);--c2:rgba(255,255,255,.03);--ac:#7c6aff;--ac2:#a78bfa;--gn:#34d399;--gn2:#6ee7b7;--tx:#f0f0f5;--t2:rgba(255,255,255,.45);--bd:rgba(255,255,255,.08);--glass:rgba(255,255,255,.05);--shadow:0 8px 32px rgba(0,0,0,.4)}
body{font-family:-apple-system,system-ui,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent;max-width:480px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes slideBody{from{max-height:0;opacity:0}to{max-height:600px;opacity:1}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(124,106,255,.3)}50%{box-shadow:0 0 20px rgba(124,106,255,.6)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes ripple{to{transform:scale(2.5);opacity:0}}
@keyframes countUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.4);opacity:1}}
.tabs{display:flex;gap:4px;padding:16px 12px 12px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 80%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 18px;border-radius:24px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;background:var(--c1);color:var(--t2);transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.tab:active{transform:scale(.93)}
.tab.on{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 4px 16px rgba(124,106,255,.35)}
.page-transition{animation:fadeUp .35s cubic-bezier(.4,0,.2,1) both}
.hero{padding:4px 12px 14px;animation:fadeUp .4s .05s both}
.hero-title{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hero-dot{width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,var(--ac),var(--ac2));flex-shrink:0;animation:dotPulse 2s infinite}
.hero-title h2{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--tx),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;padding:4px 0}
.hero-scroll::-webkit-scrollbar{display:none}
.hero-card{flex-shrink:0;width:42%;border-radius:16px;overflow:hidden;position:relative;background:var(--c2);scroll-snap-align:start;transition:transform .25s;box-shadow:var(--shadow)}
.hero-card:active{transform:scale(.96)}
.hero-card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:transform .4s}
.hero-card:active img{transform:scale(1.05)}
.hero-card .hc-lb{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,.85));font-size:.65rem;color:rgba(255,255,255,.9);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;backdrop-filter:blur(4px)}
.hero-count{position:absolute;bottom:8px;right:10px;font-size:.6rem;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:3px}
/* Calendar */
.cal{padding:12px;animation:fadeUp .35s both}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px}
.cal-nav button{background:var(--c1);border:1px solid var(--bd);color:var(--tx);font-size:1rem;width:40px;height:40px;border-radius:12px;cursor:pointer;transition:all .2s}
.cal-nav button:active{transform:scale(.9);background:var(--ac);color:#fff}
.cal-nav span{font-size:.92rem;font-weight:800;min-width:120px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-hd{font-size:.6rem;color:var(--t2);text-align:center;padding:4px 0;font-weight:700}
.cal-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7rem;background:var(--c1);position:relative;gap:1px;transition:all .2s;cursor:pointer;border:1px solid transparent}
.cal-cell:active{transform:scale(.9)}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.today{border:2px solid var(--ac);animation:glow 2s infinite}
.cal-cell .cal-d{font-weight:800}
.cal-cell .cal-tag{font-size:.45rem;color:var(--ac2);font-weight:700;max-width:87%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-cell.done{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.25)}
.cal-cell.done .cal-d{color:var(--gn)}
.cal-cell.partial{background:rgba(124,106,255,.1);border-color:rgba(124,106,255,.2)}
.cal-cell.partial .cal-d{color:var(--ac2)}
.cal-stats{display:flex;gap:10px;margin-top:18px;justify-content:center;flex-wrap:wrap}
.cal-stat{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:14px 18px;text-align:center;min-width:90px;transition:transform .2s}
.cal-stat:active{transform:scale(.95)}
.cal-stat .cs-n{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--gn),var(--gn2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:countUp .5s both}
.cal-stat .cs-l{font-size:.62rem;color:var(--t2);margin-top:3px}
/* Goal */
.goal{padding:20px 12px;text-align:center;animation:fadeUp .4s both}
.goal-img{width:100%;max-width:320px;border-radius:20px;object-fit:cover;margin:0 auto 18px;display:block;box-shadow:0 8px 40px rgba(124,106,255,.3);transition:transform .3s}
.goal-img:active{transform:scale(.97)}
.goal-label{font-size:.95rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.goal-sub{font-size:.75rem;color:var(--t2)}
/* Body Analysis */
.ba{padding:0 12px 20px;animation:fadeUp .4s .15s both}
.ba-title{font-size:.78rem;font-weight:800;color:var(--t2);text-align:center;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
.ba-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.ba-card{background:var(--c1);border:1px solid var(--bd);border-radius:16px;padding:14px 10px;text-align:center;position:relative;overflow:hidden;transition:transform .2s}
.ba-card:active{transform:scale(.95)}
.ba-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.ba-card.purple::before{background:linear-gradient(90deg,var(--ac),var(--ac2))}
.ba-card.green::before{background:linear-gradient(90deg,var(--gn),var(--gn2))}
.ba-card.amber::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.ba-card.pink::before{background:linear-gradient(90deg,#f472b6,#fb7185)}
.ba-card.blue::before{background:linear-gradient(90deg,#60a5fa,#38bdf8)}
.ba-card.cyan::before{background:linear-gradient(90deg,#22d3ee,#67e8f9)}
.ba-icon{font-size:1.4rem;margin-bottom:4px}
.ba-val{font-size:1.2rem;font-weight:900;margin-bottom:2px}
.ba-card.purple .ba-val{color:var(--ac2)}
.ba-card.green .ba-val{color:var(--gn2)}
.ba-card.amber .ba-val{color:#fbbf24}
.ba-card.pink .ba-val{color:#fb7185}
.ba-card.blue .ba-val{color:#60a5fa}
.ba-card.cyan .ba-val{color:#67e8f9}
.ba-label{font-size:.58rem;color:var(--t2)}
.ba-wide{grid-column:span 2;display:flex;align-items:center;gap:14px;padding:14px 16px;text-align:left}
.ba-wide .ba-icon{font-size:1.6rem;margin:0;flex-shrink:0}
.ba-wide .ba-info{flex:1}
.ba-wide .ba-val{font-size:1rem;margin-bottom:1px}
.ba-wide .ba-label{font-size:.6rem}
.ba-bar-wrap{height:6px;border-radius:3px;background:var(--c2);overflow:hidden;margin-top:6px}
.ba-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.ba-section{margin-top:16px}
.ba-stitle{font-size:.68rem;font-weight:700;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ba-measures{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ba-mcard{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:10px 6px;text-align:center}
.ba-mval{font-size:.95rem;font-weight:800;color:var(--tx)}
.ba-munit{font-size:.55rem;color:var(--t2)}
.ba-mlabel{font-size:.52rem;color:var(--t2);margin-top:2px}
.ba-routine{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;margin-top:10px}
.ba-routine-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:.72rem}
.ba-routine-row:last-child{border:none}
.ba-routine-row .ba-ri{font-size:1rem;width:28px;text-align:center;flex-shrink:0}
.ba-routine-row .ba-rt{flex:1;color:var(--t2)}
.ba-routine-row .ba-rv{font-weight:700;color:var(--tx);white-space:nowrap}
/* My Stats */
.my{padding:0 12px 20px;animation:fadeUp .4s .2s both}
.my-title{font-size:.78rem;font-weight:800;color:var(--t2);text-align:center;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
.my-form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.my-field{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:10px;position:relative}
.my-field label{display:block;font-size:.55rem;color:var(--t2);margin-bottom:4px;font-weight:700}
.my-field input{width:100%;background:transparent;border:none;color:var(--tx);font-size:1rem;font-weight:800;font-family:inherit;outline:none}
.my-field input::placeholder{color:rgba(255,255,255,.2)}
.my-field .my-unit{position:absolute;right:10px;top:50%;transform:translateY(20%);font-size:.6rem;color:var(--t2)}
.my-field.wide{grid-column:span 2}
.my-field.wide input{font-size:.85rem}
.my-save{width:100%;padding:12px;border:none;border-radius:14px;font-size:.82rem;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;transition:all .2s;margin-bottom:8px}
.my-save:active{transform:scale(.96)}
/* AI Analysis */
.ai{padding:0 12px 20px;animation:fadeUp .4s .25s both}
.ai-title{font-size:.78rem;font-weight:800;color:var(--t2);text-align:center;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
.ai-card{background:var(--c1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ai-card.gap::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.ai-card.tip::before{background:linear-gradient(90deg,var(--ac),var(--ac2))}
.ai-card.good::before{background:linear-gradient(90deg,var(--gn),var(--gn2))}
.ai-card.warn::before{background:linear-gradient(90deg,#ef4444,#f87171)}
.ai-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-head .ai-icon{font-size:1.2rem}
.ai-head .ai-label{font-size:.75rem;font-weight:800}
.ai-body{font-size:.72rem;color:var(--t2);line-height:1.6}
.ai-body b{color:var(--tx);font-weight:700}
.ai-compare{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ai-cmp{flex:1;min-width:80px;background:var(--c2);border-radius:10px;padding:8px 6px;text-align:center}
.ai-cmp .ac-label{font-size:.5rem;color:var(--t2);margin-bottom:3px}
.ai-cmp .ac-val{font-size:.82rem;font-weight:800}
.ai-cmp .ac-you{color:var(--ac2)}
.ai-cmp .ac-rain{color:var(--gn2)}
.ai-cmp .ac-diff{font-size:.55rem;margin-top:2px}
.ai-cmp .ac-diff.up{color:var(--gn)}
.ai-cmp .ac-diff.down{color:#f59e0b}
.ai-progress{margin-top:12px}
.ai-prog-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-prog-label{font-size:.6rem;color:var(--t2);width:50px;flex-shrink:0}
.ai-prog-bar{flex:1;height:8px;border-radius:4px;background:var(--c2);overflow:hidden;position:relative}
.ai-prog-bar .apb-you{position:absolute;top:0;left:0;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .8s}
.ai-prog-bar .apb-rain{position:absolute;top:0;height:100%;width:3px;background:var(--gn);border-radius:2px}
.ai-prog-val{font-size:.6rem;font-weight:700;width:40px;text-align:right;flex-shrink:0}


/* Rest */
.rest{text-align:center;padding:80px 20px;color:var(--t2);animation:fadeUp .4s both}
.rest span{font-size:3.2rem;display:block;margin-bottom:10px;animation:pulse 2s infinite}
.rest p{font-size:.92rem;line-height:1.6}
/* Exercise cards */
.ex{background:var(--c1);border:1px solid var(--bd);border-radius:18px;margin:0 12px 12px;overflow:hidden;transition:all .25s;animation:fadeUp .4s both}
.ex:active{transform:scale(.985)}
.ex.open{border-color:rgba(124,106,255,.2);box-shadow:0 4px 24px rgba(124,106,255,.1)}
.ex-head{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:12px;position:relative;overflow:hidden}
.ex-head .ripple{position:absolute;border-radius:50%;background:rgba(124,106,255,.15);animation:ripple .6s ease-out forwards;pointer-events:none}
.ex-thumb{width:48px;height:48px;border-radius:12px;object-fit:cover;background:var(--c2);flex-shrink:0;transition:transform .25s}
.ex.open .ex-thumb{transform:scale(1.05)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:.68rem;color:var(--t2);margin-top:3px}
.ex-tag{font-size:.7rem;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;white-space:nowrap}
.ex-arr{font-size:.65rem;color:var(--t2);transition:all .3s cubic-bezier(.4,0,.2,1);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--c2)}
.ex.open .ex-arr{transform:rotate(90deg);background:rgba(124,106,255,.15);color:var(--ac)}
.ex-body{max-height:0;overflow:hidden;padding:0 14px;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .35s,opacity .25s;opacity:0}
.ex.open .ex-body{max-height:600px;padding:0 14px 14px;opacity:1}
.ex-pics{display:flex;gap:8px;margin-bottom:12px}
.ex-pics .pw{position:relative;flex:1;border-radius:10px;overflow:hidden}
.ex-pics img{width:100%;border-radius:10px;aspect-ratio:3/4;object-fit:cover;background:var(--c2);transition:transform .3s}
.ex-pics .pw:active img{transform:scale(1.05)}
.ex-pics .pl{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:.58rem;color:rgba(255,255,255,.8);background:rgba(0,0,0,.6);padding:2px 8px;border-radius:6px;backdrop-filter:blur(4px)}
/* Set rows */
.sr{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);transition:background .2s}
.sr:last-child{border:none}
.sr:active{background:rgba(255,255,255,.02);border-radius:8px}
.sn{width:22px;height:22px;font-size:.62rem;color:var(--t2);text-align:center;font-weight:900;background:var(--c2);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sr-reps{flex:1;font-size:.8rem;color:var(--t2);font-weight:500}
.sc{width:36px;height:36px;border-radius:10px;border:2px solid var(--bd);background:none;cursor:pointer;font-size:.78rem;color:transparent;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.4,0,.2,1);margin-left:auto;position:relative;overflow:hidden}
.sc:active{transform:scale(.85)}
.sc.on{background:linear-gradient(135deg,var(--gn),var(--gn2));border-color:transparent;color:#fff;box-shadow:0 2px 12px rgba(52,211,153,.3);animation:scaleIn .25s}
.sc .ripple{position:absolute;border-radius:50%;background:rgba(52,211,153,.2);animation:ripple .5s ease-out forwards;pointer-events:none}
/* Progress ring */
.prog-ring{position:relative;width:42px;height:42px;flex-shrink:0}
.prog-ring svg{transform:rotate(-90deg)}
.prog-ring circle{fill:none;stroke-width:3.5}
.prog-ring .ring-bg{stroke:var(--c1)}
.prog-ring .ring-fill{stroke:url(#progGrad);stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.prog-ring .ring-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.6rem;font-weight:900}
/* Bottom bar */
.bot{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:20;max-width:480px;margin:0 auto}
.bot-done{padding:9px 22px;border:none;border-radius:12px;font-size:.8rem;font-weight:800;cursor:pointer;background:var(--c1);color:var(--t2);transition:all .25s;position:relative;overflow:hidden}
.bot-done:active{transform:scale(.93)}
.bot-done.on{background:linear-gradient(135deg,var(--gn),var(--gn2));color:#fff;box-shadow:0 4px 16px rgba(52,211,153,.3)}
/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confetti 1.2s ease-out forwards;z-index:100;pointer-events:none}
/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(52,211,153,.95);color:#fff;padding:16px 28px;border-radius:16px;font-size:.88rem;font-weight:800;z-index:200;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;backdrop-filter:blur(8px);text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
/* Exercise progress badge */
.ex-prog{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:900;flex-shrink:0;transition:all .25s}
.ex-prog.none{background:var(--c2);color:var(--t2)}
.ex-prog.partial{background:rgba(124,106,255,.15);color:var(--ac)}
.ex-prog.full{background:rgba(52,211,153,.15);color:var(--gn);animation:scaleIn .3s}
/* Install banner */
#ib{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;z-index:200;font-size:.84rem;font-weight:700;backdrop-filter:blur(12px)}
#ib span{flex:1}
#ib button{padding:7px 16px;border:none;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;transition:.2s}
#ib button:active{transform:scale(.93)}
#ib .inst{background:#fff;color:var(--ac)}
#ib .dis{background:transparent;color:rgba(255,255,255,.7)}
/* Swipe hint */
.swipe-hint{text-align:center;font-size:.6rem;color:var(--t2);padding:4px 0 8px;animation:fadeIn .5s .3s both}
/* Diet / Calories */
.diet{padding:12px;animation:fadeUp .4s both}
.diet-header{text-align:center;margin-bottom:18px}
.diet-ring{position:relative;width:130px;height:130px;margin:0 auto 8px}
.diet-ring svg{transform:rotate(-90deg)}
.diet-ring circle{fill:none;stroke-width:8}
.diet-ring .dr-bg{stroke:var(--c1)}
.diet-ring .dr-fill{stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.diet-ring .dr-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.diet-ring .dr-cal{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.diet-ring .dr-sub{font-size:.58rem;color:var(--t2);margin-top:1px}
.diet-target-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}

let day=1,data={};
const K=(d,e,s)=>`d${d}e${e}s${s}`;
const DK=d=>`d${d}_done`;
const $=id=>document.getElementById(id);

function load(){try{const r=JSON.parse(localStorage.getItem('wt4')||'{}');day=r.day||1;data=r.data||{}}catch(_){}}
function save(){localStorage.setItem('wt4',JSON.stringify({day,data}))}

function pct(d){
  const dd=D.find(x=>x.id===d);
  if(!dd||dd.rest)return 0;
  let t=0,dn=0;
  dd.ex.forEach((e,ei)=>{for(let s=0;s<e.s;s++){t++;if((data[K(d,ei,s)]||{}).done)dn++}});
  return t?Math.round(dn/t*100):0;
}

function addRipple(el,e){
  const r=document.createElement('span');r.className='ripple';
  const rect=el.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  el.appendChild(r);setTimeout(()=>r.remove(),600);
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}
function fireConfetti(){

    p.style.animationDuration=(.8+Math.random()*.8)+'s';
    p.style.animationDelay=(Math.random()*.3)+'s';
    p.style.width=(5+Math.random()*6)+'px';p.style.height=(5+Math.random()*6)+'px';

}

      sets+='<div class="sr"><span class="sn">'+(s+1)+'</span><span class="sr-reps">'+ex.r+' \u6b21</span><button class="sc'+(rec.done?' on':'')+'" data-k="'+K(day,ei,s)+'" data-ei="'+ei+'">\u2713</button></div>';
    }
    const u0=imgUrl(ex.n,0),u1=imgUrl(ex.n,1);
    const pics=u0?'<div class="ex-pics"><div class="pw"><img loading="lazy" src="'+u0+'" alt="start"><div class="pl">\u8d77\u59cb</div></div><div class="pw"><img loading="lazy" src="'+u1+'" alt="end"><div class="pl">\u5b8c\u6210</div></div></div>':'';
    card.innerHTML='<div class="ex-head">'+(thumb?'<img class="ex-thumb" loading="lazy" src="'+thumb+'" alt="'+ex.n+'">':'')+'<div class="ex-info"><div class="ex-name">'+ex.n+'</div><div class="ex-meta">'+ex.m+'</div></div><div class="ex-prog '+progCls+'">'+progTxt+'</div><div class="ex-tag">'+ex.s+'\u00d7'+ex.r+'</div><div class="ex-arr">\u25b6</div></div><div class="ex-body">'+pics+sets+'</div>';
    card.querySelector('.ex-head').setAttribute('role','button');card.querySelector('.ex-head').setAttribute('tabindex','0');card.querySelector('.ex-head').setAttribute('aria-expanded','false');card.querySelector('.ex-head').onclick=(e)=>{addRipple(card.querySelector('.ex-head'),e);card.classList.toggle('open');card.querySelector('.ex-head').setAttribute('aria-expanded',String(card.classList.contains('open')));};
    pg.appendChild(card);
  });
  pg.querySelectorAll('.sc').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();addRipple(btn,e);
      const kk=btn.dataset.k,ei=parseInt(btn.dataset.ei);
      if(!data[kk])data[kk]={done:false};
      data[kk].done=!data[kk].done;btn.classList.toggle('on');save();upBot();
      // Update exercise progress badge
      const ex=dd.ex[ei];const ep=exPct(day,ei,ex);
      const badge=pg.querySelectorAll('.ex')[ei].querySelector('.ex-prog');
      if(badge){badge.className='ex-prog '+(ep>=100?'full':ep>0?'partial':'none');badge.textContent=ep>=100?'\u2713':ep>0?ep+'%':'';pg.querySelectorAll('.ex')[ei].classList.toggle('done',ep>=100);}
      if(ep>=100)showToast('\ud83d\udcaa '+ex.n+' \u5b8c\u6210\uff01');
      if(navigator.vibrate)navigator.vibrate(30);
    };
  });
  // Swipe to change day
  let sx=0;
  pg.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});
  pg.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)<60)return;
    const ids=D.filter(d=>!d.goal&&!d.cal).map(d=>d.id);
    const ci=ids.indexOf(day);if(ci<0)return;
    if(dx<0&&ci<ids.length-1){day=ids[ci+1];save();render();}
    else if(dx>0&&ci>0){day=ids[ci-1];save();render();}
  },{passive:true});
  upBot();
}

function upBot(){
  const p=pct(day);
  $('bPct').textContent=p+'%';
  const circ=$('bCircle');
  if(circ){const offset=113.1-(113.1*p/100);circ.style.strokeDashoffset=offset;}
  const btn=$('bDone'),done=data[DK(day)];
  btn.className='bot-done'+(done?' on':'');
  btn.textContent=done?'\u2705 \u5b8c\u6210':'\u5b8c\u6210';
}
$('bDone').onclick=()=>{
  const wasDone=data[DK(day)];
  data[DK(day)]=!wasDone;
  if(!wasDone){
    const t=new Date(),ds=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
    const dd=D.find(x=>x.id===day);
    if(!data._cal)data._cal={};
    data._cal[ds]={d:day,lb:dd?dd.lb:'',p:pct(day)};
    fireConfetti();showToast('\ud83c\udf89 Day '+day+' \u5b8c\u6210\uff01');
    if(navigator.vibrate)navigator.vibrate([50,30,50]);
  }
  save();render();
};

let calY,calM;
function initCalDate(){const t=new Date();calY=t.getFullYear();calM=t.getMonth();}
initCalDate();
function renderCal(){
  const pg=$('page');pg.innerHTML='';
  const cal=data._cal||{};
  const mn=['1\u6708','2\u6708','3\u6708','4\u6708','5\u6708','6\u6708','7\u6708','8\u6708','9\u6708','10\u6708','11\u6708','12\u6708'];
  const wd=['\u65e5','\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d'];
  const daysIn=new Date(calY,calM+1,0).getDate();
  const firstDay=new Date(calY,calM,1).getDay();
  const today=new Date();
  const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  let h='<div class="cal"><div class="cal-nav">';
  h+='<button id="calP" aria-label="上個月">&lt;</button>';
  h+='<span>'+calY+' '+mn[calM]+'</span>';
  h+='<button id="calN" aria-label="下個月">&gt;</button></div>';
  h+='<div class="cal-grid">';
  wd.forEach(w=>{h+='<div class="cal-hd">'+w+'</div>';});
  for(let i=0;i<firstDay;i++)h+='<div class="cal-cell empty"></div>';
  let monthDone=0,monthTotal=0;
  for(let d=1;d<=daysIn;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const rec=cal[ds];
    const isToday=ds===todayStr;
    let cls='cal-cell';
    if(isToday)cls+=' today';
    if(rec&&rec.p>=100)cls+=' done';
    else if(rec)cls+=' partial';
    monthTotal++;
    if(rec)monthDone++;
    h+='<div class="'+cls+'"><span class="cal-d">'+d+'</span>';
    if(rec)h+='<span class="cal-tag">'+rec.lb+'</span>';
    h+='</div>';
  }
  h+='</div>';
  const streak=calcStreak(cal,todayStr);
  h+='<div class="cal-stats">';
  h+='<div class="cal-stat"><div class="cs-n">'+monthDone+'</div><div class="cs-l">\u672c\u6708\u8a13\u7df4</div></div>';
  h+='<div class="cal-stat"><div class="cs-n">'+streak+'</div><div class="cs-l">\u9023\u7e8c\u5929\u6578</div></div>';
  h+='<div class="cal-stat"><div class="cs-n">'+(monthDone>0?Math.round(monthDone/monthTotal*100):0)+'%</div><div class="cs-l">\u51fa\u5e2d\u7387</div></div>';
  h+='</div></div>';
  pg.innerHTML=h;
  $('calP').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();};
  $('calN').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();};
}
function calcStreak(cal,todayStr){
  let s=0,d=new Date();
  while(true){
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(cal[ds])s++; else if(ds!==todayStr)break; 
    d.setDate(d.getDate()-1);
  }
  return s;
}

function buildAI(my){
  const h_m=my.h/100;
  const bmi=+(my.w/(h_m*h_m)).toFixed(1);
  const bf=my.bf||estimateBF(bmi);
  const lean=+(my.w*(1-bf/100)).toFixed(1);
  const fat=+(my.w*bf/100).toFixed(1);
  const ffmi=+(lean/(h_m*h_m)).toFixed(1);
  const goalW=my.goalW||my.w;
  const toGoal=+(my.w-goalW).toFixed(1);

  let h='<div class="ai"><div class="ai-title">\ud83e\udd16 AI \u667a\u80fd\u5206\u6790</div>';

  // 1. Comparison card
  h+='<div class="ai-card gap"><div class="ai-head"><span class="ai-icon">\ud83d\udcca</span><span class="ai-label">\u4f60 vs Rain \u5c0d\u6bd4</span></div>';
  h+='<div class="ai-compare">';
  h+=cmpBox('BMI',bmi,RAIN.bmi);
  h+=cmpBox('\u9ad4\u8102%',+bf.toFixed(1),RAIN.bf);
  h+=cmpBox('FFMI',ffmi,RAIN.ffmi);
  h+=cmpBox('\u808c\u8089kg',lean,RAIN.lean);
  h+='</div>';
  // Progress bars
  h+='<div class="ai-progress">';
  h+=progBar('BMI',bmi,RAIN.bmi,30);
  h+=progBar('\u9ad4\u8102',bf,RAIN.bf,35);
  h+=progBar('FFMI',ffmi,RAIN.ffmi,25);
  h+='</div></div>';

  // 2. AI verdict
  const verdicts=getVerdicts(bmi,bf,ffmi,lean,toGoal,my);
  verdicts.forEach(v=>{
    h+='<div class="ai-card '+v.type+'"><div class="ai-head"><span class="ai-icon">'+v.icon+'</span><span class="ai-label">'+v.title+'</span></div>';
    h+='<div class="ai-body">'+v.body+'</div></div>';
  });

  h+='</div>';
  return h;
}

function estimateBF(bmi){
  // rough estimate from BMI (male)
  if(bmi<18.5)return 10;
  if(bmi<22)return 14;
  if(bmi<25)return 18;
  if(bmi<28)return 23;
  return 28;
}

function cmpBox(label,you,rain){
  const diff=+(you-rain).toFixed(1);
  const cls=diff<=0?'up':'down';
  const sign=diff>0?'+':'';
  return '<div class="ai-cmp"><div class="ac-label">'+label+'</div><div class="ac-val ac-you">'+you+'</div><div class="ac-val ac-rain" style="font-size:.6rem;opacity:.6">\ud83c\udfaf '+rain+'</div><div class="ac-diff '+cls+'">'+sign+diff+'</div></div>';
}

function progBar(label,you,rain,max){
  const youPct=Math.min(you/max*100,100);
  const rainPct=Math.min(rain/max*100,100);
  return '<div class="ai-prog-row"><span class="ai-prog-label">'+label+'</span><div class="ai-prog-bar"><div class="apb-you" style="width:'+youPct+'%"></div><div class="apb-rain" style="left:'+rainPct+'%"></div></div><span class="ai-prog-val">'+you+'</span></div>';
}

function getVerdicts(bmi,bf,ffmi,lean,toGoal,my){
  const v=[];
  // BMI
  if(bmi<18.5)v.push({type:'warn',icon:'\u26a0\ufe0f',title:'\u9ad4\u91cd\u904e\u8f15',body:'\u4f60\u7684 BMI <b>'+bmi+'</b> \u504f\u4f4e\u3002\u5efa\u8b70\u589e\u52a0\u71b1\u91cf\u651d\u53d6\uff0c\u5c24\u5176\u662f<b>\u86cb\u767d\u8cea</b>\uff08\u9ad4\u91cd\u00d72g\uff09\u4f86\u4fc3\u9032\u589e\u808c\u3002'});
  else if(bmi<24.9)v.push({type:'good',icon:'\u2705',title:'BMI \u6b63\u5e38\u7bc4\u570d',body:'\u4f60\u7684 BMI <b>'+bmi+'</b> \u5728\u5065\u5eb7\u7bc4\u570d\u5167\u3002Rain \u7684 BMI <b>23.9</b> \u4e5f\u88ab\u6a5f\u5668\u5224\u300c\u6e96\u80a5\u80d6\u300d\uff0c\u4f46\u5be6\u969b\u662f\u808c\u8089\u91cf\u9ad8\u2014\u2014BMI \u4e0d\u662f\u552f\u4e00\u6307\u6a19\u3002'});
  else v.push({type:'warn',icon:'\ud83d\udcc9',title:'BMI \u504f\u9ad8',body:'\u4f60\u7684 BMI <b>'+bmi+'</b> \u8d85\u904e\u6a19\u6e96\u3002\u5efa\u8b70\u63a7\u5236\u71b1\u91cf\u8212\u5b57\uff08\u6bcf\u65e5\u6e1b 300~500 kcal\uff09\uff0c\u914d\u5408\u91cd\u8a13\u4fdd\u7559\u808c\u8089\u91cf\u3002'});

  // Body fat
  if(bf>0){
    const bfDiff=+(bf-RAIN.bf).toFixed(1);
    if(bf<=15)v.push({type:'good',icon:'\ud83d\udd25',title:'\u9ad4\u8102\u7387\u512a\u79c0',body:'\u4f60\u7684\u9ad4\u8102 <b>'+bf.toFixed(1)+'%</b> \u5df2\u63a5\u8fd1 Rain \u7684 <b>13%</b>\u3002\u7e7c\u7e8c\u4fdd\u6301\u9ad8\u86cb\u767d\u98f2\u98df + \u91cd\u8a13\u3002'});
    else v.push({type:'tip',icon:'\ud83c\udfaf',title:'\u9ad4\u8102\u7387\u5dee\u8ddd',body:'\u4f60\u7684\u9ad4\u8102 <b>'+bf.toFixed(1)+'%</b>\uff0cRain \u7d04 <b>13%</b>\uff0c\u5dee <b>'+bfDiff+'%</b>\u3002\u5efa\u8b70\uff1a<b>\u4e0b\u5348 5 \u9ede\u5f8c\u4e0d\u9032\u98df</b>\uff08Rain \u7684\u65b9\u6cd5\uff09\uff0b\u6bcf\u65e5 HIIT \u00d72 \u6b21\u3002'});
  }

  // FFMI
  const ffmiDiff=+(RAIN.ffmi-ffmi).toFixed(1);
  if(ffmi>=20)v.push({type:'good',icon:'\ud83c\udfc6',title:'FFMI \u512a\u79c0',body:'FFMI <b>'+ffmi+'</b> \u5df2\u9054\u81ea\u7136\u5065\u7f8e\u6c34\u6e96\uff08\u2265 20\uff09\u3002Rain \u7d04 <b>20.8</b>\uff0c\u4f60\u5f88\u63a5\u8fd1\u4e86\uff01'});
  else if(ffmi>=18)v.push({type:'tip',icon:'\ud83d\udcc8',title:'FFMI \u9084\u6709\u7a7a\u9593',body:'FFMI <b>'+ffmi+'</b>\uff0c\u9700\u8981\u589e\u808c <b>'+Math.round(ffmiDiff*((my.h/100)**2))+'kg</b> \u7684\u808c\u8089\u624d\u80fd\u8ffd\u5e73 Rain\u3002\u5c08\u6ce8\u8907\u5408\u52d5\u4f5c\uff08\u6df1\u8e72\u3001\u786c\u8209\u3001\u81e5\u63a8\uff09\uff0b\u6bcf\u9910 30~40g \u86cb\u767d\u3002'});
  else v.push({type:'tip',icon:'\ud83d\udcaa',title:'\u589e\u808c\u6f5b\u529b\u5927',body:'FFMI <b>'+ffmi+'</b>\uff0c\u8ddd Rain \u7684 <b>20.8</b> \u9084\u6709\u5f88\u5927\u7a7a\u9593\u3002\u597d\u6d88\u606f\u662f\uff1a\u65b0\u624b\u671f\u589e\u808c\u6700\u5feb\uff01\u5efa\u8b70\u8d85\u91cf\u98f2\u98df +300 kcal\uff0c\u91cd\u8a13 4~5 \u5929/\u9031\u3002'});

  // Goal weight
  if(toGoal>0)v.push({type:'tip',icon:'\u2696\ufe0f',title:'\u76ee\u6a19\u9ad4\u91cd\u5dee\u8ddd',body:'\u76ee\u524d <b>'+my.w+'kg</b> \u2192 \u76ee\u6a19 <b>'+my.goalW+'kg</b>\uff0c\u9700\u6e1b <b>'+toGoal+'kg</b>\u3002\u4ee5\u6bcf\u9031 0.5kg \u7684\u901f\u5ea6\uff0c\u9810\u8a08 <b>'+Math.ceil(toGoal/0.5)+' \u9031</b>\u53ef\u9054\u6210\u3002\u6bcf\u65e5\u71b1\u91cf\u8d64\u5b57\u7d04 500 kcal\u3002'});
  else if(toGoal<0)v.push({type:'tip',icon:'\ud83d\udcc8',title:'\u76ee\u6a19\u589e\u91cd',body:'\u76ee\u524d <b>'+my.w+'kg</b> \u2192 \u76ee\u6a19 <b>'+my.goalW+'kg</b>\uff0c\u9700\u589e <b>'+Math.abs(toGoal)+'kg</b>\u3002\u5efa\u8b70\u6bcf\u65e5\u8d85\u91cf 300~500 kcal\uff0c\u4ee5\u6bcf\u6708 1~2kg \u7684\u901f\u5ea6\u4e7e\u6de8\u589e\u808c\u3002'});

  // Personal note
  if(my.note)v.push({type:'tip',icon:'\ud83d\udcdd',title:'\u4f60\u7684\u76ee\u6a19',body:'<b>'+my.note+'</b>\u2014\u2014\u6301\u7e8c\u8ffd\u8e64\u6bcf\u65e5\u8a13\u7df4\u548c\u98f2\u98df\uff0c\u4f60\u6703\u5230\u9054\u9019\u500b\u76ee\u6a19\u7684\uff01'});

  return v;
}

  {n:'\u82b1\u6930\u83dc',icon:'\ud83e\udd66',cal:34,p:3,c:7,f:0,unit:'100g'},
  {n:'\u8c46\u8150',icon:'\ud83e\uddc8',cal:76,p:8,c:2,f:5,unit:'1\u584a'},
  {n:'\u4e73\u6e05\u86cb\u767d',icon:'\ud83e\udd4a',cal:120,p:24,c:3,f:1,unit:'1\u4efd'},
  {n:'\u5e0c\u81d8\u512a\u683c',icon:'\ud83e\uded9',cal:100,p:17,c:6,f:1,unit:'1\u676f'},
  {n:'\u725b\u8089',icon:'\ud83e\udd69',cal:250,p:26,c:0,f:15,unit:'100g'},
  {n:'\u767d\u98ef',icon:'\ud83c\udf5a',cal:242,p:4,c:53,f:0,unit:'1\u7897'}
];
const DIET_TARGET_DEFAULT=2000;
const MACRO_TARGETS={p:150,c:200,f:55};

function todayStr(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function getDietTarget(){return data._dietTarget||DIET_TARGET_DEFAULT;}
function setDietTarget(v){data._dietTarget=Math.max(800,Math.min(5000,v));save();}
function getDietLog(ds){if(!data._diet)data._diet={};if(!data._diet[ds])data._diet[ds]=[];return data._diet[ds];}
function addDietEntry(ds,entry){if(!data._diet)data._diet={};if(!data._diet[ds])data._diet[ds]=[];data._diet[ds].push(entry);save();}
function removeDietEntry(ds,idx){if(data._diet&&data._diet[ds]){data._diet[ds].splice(idx,1);save();}}
function dietTotals(ds){const log=getDietLog(ds);return log.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+(e.p||0),c:a.c+(e.c||0),f:a.f+(e.f||0)}),{cal:0,p:0,c:0,f:0});}

function renderDiet(){
  const pg=$('page');pg.innerHTML='';
  const ds=todayStr();
  const log=getDietLog(ds);
  const totals=dietTotals(ds);
  const target=getDietTarget();
  const pctCal=Math.min(Math.round(totals.cal/target*100),100);
  const remain=Math.max(target-totals.cal,0);
  // Ring circumference: r=54 → 2*pi*54 ≈ 339.3
  const circ=339.3;
  const offset=circ-(circ*pctCal/100);

  let h='<div class="diet">';
  // Header ring
  h+='<div class="diet-header">';
  h+='<div class="diet-ring"><svg width="130" height="130" viewBox="0 0 130 130">';
  h+='<circle class="dr-bg" cx="65" cy="65" r="54"/>';
  h+='<circle class="dr-fill" cx="65" cy="65" r="54" stroke="url(#dietGrad)" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/>';
  h+='</svg><div class="dr-txt"><div class="dr-cal">'+totals.cal+'</div><div class="dr-sub">\u5269\u9918 '+remain+' kcal</div></div></div>';
  // Target adjust
  h+='<div class="diet-target-row">';
  h+='<button class="diet-target-btn" id="dtMinus">\u2212</button>';
  h+='<div class="diet-target-val">\ud83c\udfaf '+target+' kcal</div>';
  h+='<button class="diet-target-btn" id="dtPlus">+</button>';
  h+='</div>';
  h+='</div>';

  // Macros
  const mp=MACRO_TARGETS;
  const macros=[
    {label:'\u86cb\u767d\u8cea',val:Math.round(totals.p),max:mp.p,color:'#60a5fa',unit:'g'},
    {label:'\u78b3\u6c34',val:Math.round(totals.c),max:mp.c,color:'#fbbf24',unit:'g'},
    {label:'\u8102\u80aa',val:Math.round(totals.f),max:mp.f,color:'#f472b6',unit:'g'}
  ];
  h+='<div class="diet-macros">';
  macros.forEach(m=>{
    const w=Math.min(Math.round(m.val/m.max*100),100);
    h+='<div class="diet-macro"><div class="dm-bar"><div style="width:'+w+'%;background:'+m.color+'"></div></div>';
    h+='<div class="dm-val" style="color:'+m.color+'">'+m.val+'<span style="font-size:.6rem;font-weight:400;color:var(--t2)">/'+m.max+m.unit+'</span></div>';
    h+='<div class="dm-label">'+m.label+'</div></div>';
  });
  h+='</div>';

  // Custom add
  h+='<div class="diet-section"><div class="diet-stitle">\u270f\ufe0f \u81ea\u5b9a\u7fa9\u65b0\u589e</div>';
  h+='<div class="diet-custom">';
  h+='<input class="dc-name" id="dcN" type="text" placeholder="\u98df\u7269\u540d\u7a31" maxlength="20">';
  h+='<input class="dc-num" id="dcCal" type="number" placeholder="kcal" min="0" max="9999" inputmode="numeric">';
  h+='<input class="dc-num" id="dcP" type="number" placeholder="P(g)" min="0" max="999" inputmode="decimal">';
  h+='<input class="dc-num" id="dcC" type="number" placeholder="C(g)" min="0" max="999" inputmode="decimal">';
  h+='<input class="dc-num" id="dcF" type="number" placeholder="F(g)" min="0" max="999" inputmode="decimal">';
  h+='<button id="dcAdd">\u52a0\u5165</button>';
  h+='</div></div>';

  // Quick add presets
  h+='<div class="diet-section"><div class="diet-stitle">\u26a1 \u5feb\u901f\u65b0\u589e</div>';
  h+='<div class="diet-presets">';
  FOODS.forEach((f,i)=>{
    h+='<div class="diet-preset" data-fi="'+i+'">';
    h+='<div class="dp-icon">'+f.icon+'</div>';
    h+='<div class="dp-name">'+f.n+'</div>';
    h+='<div class="dp-cal">'+f.cal+' kcal \u00b7 '+f.unit+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  // Today log
  h+='<div class="diet-section"><div class="diet-stitle">\ud83d\udcdd \u4eca\u65e5\u8a18\u9304 ('+log.length+'\u7b46)</div>';
  if(log.length===0){
    h+='<div class="diet-empty">\ud83c\udf3f \u9084\u6c92\u6709\u8a18\u9304\uff0c\u958b\u59cb\u65b0\u589e\u5427</div>';
  }else{
    h+='<div class="diet-log">';
    log.forEach((e,i)=>{
      h+='<div class="diet-entry" style="animation-delay:'+(i*0.04)+'s">';
      h+='<div class="de-info"><div class="de-name">'+e.n+'</div>';
      h+='<div class="de-detail">P:'+Math.round(e.p||0)+'g \u00b7 C:'+Math.round(e.c||0)+'g \u00b7 F:'+Math.round(e.f||0)+'g</div></div>';
      h+='<div class="de-cal">'+e.cal+'</div>';
      h+='<button class="de-del" data-di="'+i+'">\u2715</button>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';

  // Daily summary stats
  if(log.length>0){
    h+='<div class="diet-summary">';
    h+='<div class="cal-stat"><div class="cs-n" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+pctCal+'%</div><div class="cs-l">\u76ee\u6a19\u9054\u6210</div></div>';
    h+='<div class="cal-stat"><div class="cs-n" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+log.length+'</div><div class="cs-l">\u98df\u7269\u7b46\u6578</div></div>';
    h+='<div class="cal-stat"><div class="cs-n" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+Math.round(totals.p*4+totals.c*4+totals.f*9)+'</div><div class="cs-l">\u5be6\u969b kcal</div></div>';
    h+='</div>';
  }

  h+='</div>';
  pg.innerHTML=h;

  // Event: target adjust
  $('dtMinus').onclick=()=>{setDietTarget(getDietTarget()-100);renderDiet();};
  $('dtPlus').onclick=()=>{setDietTarget(getDietTarget()+100);renderDiet();};

  // Event: preset click
  pg.querySelectorAll('.diet-preset').forEach(el=>{
    el.onclick=()=>{
      const f=FOODS[parseInt(el.dataset.fi)];
      addDietEntry(ds,{n:f.n,cal:f.cal,p:f.p,c:f.c,f:f.f});
      showToast('\u2705 '+f.n+' +'+f.cal+' kcal');
      if(navigator.vibrate)navigator.vibrate(20);
      renderDiet();
    };
  });

  // Event: custom add
  $('dcAdd').onclick=()=>{
    const name=($('dcN').value||'').trim();
    const cal=parseInt($('dcCal').value)||0;
    if(!name||cal<=0){showToast('\u26a0\ufe0f \u8acb\u8f38\u5165\u540d\u7a31\u548c\u71b1\u91cf');return;}
    const p=parseFloat($('dcP').value)||0;
    const c=parseFloat($('dcC').value)||0;
    const f=parseFloat($('dcF').value)||0;
    addDietEntry(ds,{n:name,cal:cal,p:p,c:c,f:f});
    showToast('\u2705 '+name+' +'+cal+' kcal');
    if(navigator.vibrate)navigator.vibrate(20);
    renderDiet();
  };

  // Event: delete entry
  pg.querySelectorAll('.de-del').forEach(btn=>{
    btn.onclick=()=>{
      removeDietEntry(ds,parseInt(btn.dataset.di));
      if(navigator.vibrate)navigator.vibrate(15);
      renderDiet();
    };
  });
}

load();render();
setTimeout(()=>{const on=document.querySelector('.tab.on');if(on)on.scrollIntoView({inline:'center',behavior:'smooth'})},100);

if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;
  const b=document.createElement('div');b.id='ib';
  b.innerHTML='<span>\ud83d\udcf2 \u5b89\u88dd\u5230\u684c\u9762</span><button class="inst" id="instB">\u5b89\u88dd</button><button class="dis" id="disB">\u2715</button>';
  document.body.appendChild(b);
  $('instB').onclick=async()=>{if(dp){dp.prompt();await dp.userChoice;dp=null}b.remove()};
  $('disB').onclick=()=>b.remove();
});
</script>
</body>
</html>
